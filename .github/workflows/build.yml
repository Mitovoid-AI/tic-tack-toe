name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/tic-tac-toe.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe
          path: app/build/outputs/apk/debug/tic-tac-toe.apk

      # Release only on manual trigger
      - name: Get version name
        if: github.event_name == 'workflow_dispatch'
        id: version
        run: |
          TAG="v1.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Tic Tac Toe ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.date }})"
          files: app/build/outputs/apk/debug/tic-tac-toe.apk
          generate_release_notes: true
